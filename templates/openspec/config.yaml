schema: spec-driven

context: |
  Platform:   Power Apps Code Apps (runs natively inside Power Apps)
  Frontend:   Vite + React 18 (TypeScript)
  Styling:    Tailwind CSS
  Routing:    React Router
  Data:       TanStack Query + Power Platform connectors (no custom backend)
  Auth:       Handled by Power Platform (no custom auth layer)
  Testing:    Vitest for unit tests, Playwright for e2e
  Monitoring: Azure Application Insights (via @microsoft/power-apps/telemetry ILogger)
  Style:      ESLint with Prettier, strict TypeScript
  Deploy:     pac CLI to Power Apps environment

rules:
  proposal:
    - Include rollback plan
    - Identify affected teams
  specs:
    - Use Given/When/Then format for scenarios
  design:
    - Include sequence diagrams for complex flows